name: Taiwan Stock Reports

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Report mode to generate
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly
  schedule:
    # Start early in the cloud, then wait until Asia/Taipei 08:00.
    - cron: "0 22 * * 0-4"
    # Start early in the cloud, then wait until Asia/Taipei Sunday 21:00.
    - cron: "0 11 * * 0"

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PYTHONIOENCODING: utf-8
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      GITHUB_REPORT_REPOSITORY: ${{ vars.GITHUB_REPORT_REPOSITORY || 'c20021013/taiwan-stock-reports' }}
      GITHUB_REPORT_TOKEN: ${{ github.token }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
      REPORT_PUBLIC_BASE_URL: ${{ vars.REPORT_PUBLIC_BASE_URL || 'https://c20021013.github.io/taiwan-stock-reports' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore market data cache
        uses: actions/cache@v4
        with:
          path: cache
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      - name: Run unit tests
        run: |
          python -m py_compile stock_report.py notify_report.py publish_report.py validate_report.py
          python -m unittest discover -s tests -v

      - name: Choose report mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 11 * * 0" ]]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait until scheduled report time
        if: github.event_name == 'schedule'
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          python - <<'PY'
          import os
          import time
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          taipei = ZoneInfo("Asia/Taipei")
          now_utc = datetime.now(timezone.utc)
          now_taipei = now_utc.astimezone(taipei)
          if os.environ["SCHEDULE"] == "0 11 * * 0":
              target_taipei = now_taipei.replace(hour=21, minute=0, second=0, microsecond=0)
          else:
              target_taipei = now_taipei.replace(hour=8, minute=0, second=0, microsecond=0)
          target_utc = target_taipei.astimezone(timezone.utc)
          delay = max(0, int((target_utc - now_utc).total_seconds()))
          print(f"Current Asia/Taipei time: {now_taipei:%Y-%m-%d %H:%M:%S}")
          print(f"Target Asia/Taipei time: {target_taipei:%Y-%m-%d %H:%M:%S}")
          print(f"Waiting {delay} seconds for the report time")
          time.sleep(delay)
          PY

      - name: Generate report
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if python stock_report.py --mode "${{ steps.mode.outputs.mode }}"; then
              exit 0
            fi
            if [[ "$attempt" -lt 3 ]]; then
              delay=$((attempt * 30))
              echo "Report generation failed; retrying in ${delay}s"
              sleep "$delay"
            fi
          done
          exit 1

      - name: Validate generated report
        run: python validate_report.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Publish HTML to GitHub Pages repository
        continue-on-error: true
        run: python publish_report.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Send notification
        run: python notify_report.py --mode "${{ steps.mode.outputs.mode }}"
